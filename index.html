<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RACER 3D - Edição Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/three@0.162.0/build/three.min.js"></script>
    <style>
        :root {
            --neon-pink: #ff1493;
            --glass: rgba(15, 15, 25, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            color: white;
        }

        #game-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* UI Overlay */
        #ui-layer {
            position: absolute; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
        }

        /* Glassmorphism Components */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            pointer-events: auto;
        }

        #dashboard {
            position: absolute; bottom: 0; width: 100%; height: 180px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 20px;
        }

        #speedometer {
            width: 150px; height: 150px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 4px solid var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-pink), inset 0 0 15px var(--neon-pink);
            background: rgba(0,0,0,0.5);
        }

        #speed-val { font-size: 48px; font-weight: 900; color: white; line-height: 1; }
        #speed-unit { font-size: 14px; color: #aaa; }

        #stats {
            position: absolute; top: 20px; right: 20px;
            padding: 15px 25px;
            text-align: right;
        }
        #stats div { font-size: 20px; font-weight: 700; }
        #coin-count { color: #ffdd00; text-shadow: 0 0 10px rgba(255,221,0,0.5); }

        /* Screens */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; background: rgba(0,0,0,0.85);
            pointer-events: auto;
        }

        h1 { font-size: 80px; margin: 0; text-transform: uppercase; letter-spacing: 5px; }
        .neon-text { color: var(--neon-pink); text-shadow: 0 0 30px var(--neon-pink); }
        
        button {
            margin-top: 30px; padding: 15px 40px;
            font-size: 24px; font-family: inherit; font-weight: 700;
            background: var(--neon-pink); color: white;
            border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--neon-pink);
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon-pink); }

        #garage-grid {
            display: flex; gap: 20px; margin-top: 40px;
        }
        .car-card {
            width: 200px; padding: 20px;
            text-align: center; cursor: pointer;
            transition: 0.3s;
        }
        .car-card:hover { background: rgba(255,255,255,0.1); }
        .car-card.selected { border: 2px solid var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

        #loading { display: flex; background: #050508; z-index: 1000; }
        .loading-bar { width: 200px; height: 4px; background: #222; margin-top: 20px; position: relative; }
        .loading-fill { width: 0%; height: 100%; background: var(--neon-pink); transition: 0.5s; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="stats" class="glass-panel">
            <div id="dist-val">0 m</div>
            <div id="coin-count">MOEDAS: 0</div>
        </div>

        <div id="dashboard">
            <div id="speedometer">
                <span id="speed-val">0</span>
                <span id="speed-unit">KM/H</span>
            </div>
        </div>
    </div>

    <!-- Menus -->
    <div id="menu-screen" class="screen" style="display: flex;">
        <h1 class="neon-text">Neon Racer</h1>
        <p>USE AS SETAS OU WASD PARA DIRIGIR</p>
        <button onclick="startGame()">CORRER AGORA</button>
        <button style="background: #333; box-shadow: none;" onclick="showGarage()">GARAGEM</button>
    </div>

    <div id="garage-screen" class="screen">
        <h1 style="color: #ffdd00; text-shadow: 0 0 20px #ffdd00;">Garagem</h1>
        <div id="garage-grid">
            <!-- Carros injetados via JS -->
        </div>
        <button onclick="hideGarage()">VOLTAR</button>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 style="color: #ff3333; text-shadow: 0 0 30px #ff3333;">BATIDA!</h1>
        <p id="final-score">Distância: 0m</p>
        <button onclick="startGame()">TENTAR NOVAMENTE</button>
        <button style="background: #333; box-shadow: none;" onclick="showMenu()">MENU</button>
    </div>

    <div id="loading" class="screen">
        <h1 class="neon-text">Carregando...</h1>
        <div class="loading-bar"><div class="loading-fill" id="load-fill"></div></div>
    </div>

    <script>
        // CONFIGURAÇÕES E ESTADO
        let scene, camera, renderer, clock;
        let car, road, ground;
        let obstacles = [], coins = [], buildings = [];
        let speed = 0, distance = 0, totalCoins = parseInt(localStorage.getItem('neon_coins')) || 0;
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        
        const CAR_COLORS = [0xff1493, 0x00ffff, 0xffdd00, 0xffffff];
        let selectedCarIndex = parseInt(localStorage.getItem('neon_selected_car')) || 0;
        let unlockedCars = JSON.parse(localStorage.getItem('neon_unlocked')) || [true, false, false, false];

        // INICIALIZAÇÃO
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('game-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            createEnvironment();
            createPlayerCar();
            createLighting();
            
            updateUI();
            
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Simular loading
            let fill = 0;
            let interval = setInterval(() => {
                fill += 10;
                document.getElementById('load-fill').style.width = fill + '%';
                if(fill >= 100) {
                    clearInterval(interval);
                    document.getElementById('loading').style.display = 'none';
                    animate();
                }
            }, 100);
        }

        function createEnvironment() {
            // Chão infinito
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });
            ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Estrada
            const roadGeo = new THREE.PlaneGeometry(20, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.5 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.05;
            scene.add(road);

            // Linhas Neon Laterais
            const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xff1493 });
            const leftLine = new THREE.Mesh(lineGeo, lineMat);
            leftLine.rotation.x = -Math.PI / 2;
            leftLine.position.set(-10, 0.1, 0);
            scene.add(leftLine);

            const rightLine = leftLine.clone();
            rightLine.position.x = 10;
            scene.add(rightLine);
        }

        function createPlayerCar() {
            if(car) scene.remove(car);
            
            car = new THREE.Group();
            
            // Corpo
            const bodyGeo = new THREE.BoxGeometry(2.2, 1, 4.5);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: CAR_COLORS[selectedCarIndex], 
                metalness: 0.8, 
                roughness: 0.2,
                emissive: CAR_COLORS[selectedCarIndex],
                emissiveIntensity: 0.2
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.8;
            car.add(body);

            // Teto/Vidro
            const cabinGeo = new THREE.BoxGeometry(1.8, 0.8, 2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x050505, transparent: true, opacity: 0.7 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 1.5, -0.2);
            car.add(cabin);

            // Rodas Neon
            const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
            wheelGeo.rotateZ(Math.PI/2);
            const wheelMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const rimMat = new THREE.MeshBasicMaterial({ color: 0xff1493 });
            
            const positions = [[-1.2, 0.5, 1.5], [1.2, 0.5, 1.5], [-1.2, 0.5, -1.5], [1.2, 0.5, -1.5]];
            positions.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.position.set(...pos);
                const r = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.42, 16), rimMat);
                r.rotateZ(Math.PI/2);
                r.position.set(...pos);
                car.add(w, r);
            });

            car.position.y = 0;
            scene.add(car);
        }

        function createLighting() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xffffff, 0.8);
            directional.position.set(10, 20, 10);
            scene.add(directional);
            
            // Luz de freio (atrás do carro)
            const point = new THREE.PointLight(0xff1493, 1, 10);
            point.position.set(0, 1, 3);
            car.add(point);
        }

        // INPUTS
        const keys = {};
        function onKeyDown(e) { keys[e.code] = true; }
        function onKeyUp(e) { keys[e.code] = false; }

        // GAME LOOP
        function update() {
            if(gameState !== 'PLAYING') return;

            const delta = clock.getDelta();
            
            // Movimentação
            if(keys['ArrowUp'] || keys['KeyW']) speed += 20 * delta;
            else if(keys['ArrowDown'] || keys['KeyS']) speed -= 40 * delta;
            else speed *= 0.98;

            speed = Math.max(0, Math.min(speed, 180));
            
            let moveSpeed = speed / 10;
            distance += moveSpeed * 0.1;

            if(keys['ArrowLeft'] || keys['KeyA']) car.position.x -= 15 * delta;
            if(keys['ArrowRight'] || keys['KeyD']) car.position.x += 15 * delta;

            car.position.x = Math.max(-8, Math.min(car.position.x, 8));
            
            // Inclinação suave
            car.rotation.z = -((keys['ArrowRight'] || keys['KeyD']) ? 0.05 : 0) + ((keys['ArrowLeft'] || keys['KeyA']) ? 0.05 : 0);

            // Câmera acompanha (suave)
            camera.position.x += (car.position.x - camera.position.x) * 0.1;
            camera.lookAt(car.position.x, 2, car.position.z - 5);

            // Obstáculos e Coletáveis (Spawn e Movimento)
            handleWorld(moveSpeed);
            
            updateUI();
        }

        function handleWorld(speedVal) {
            // Spawn Obstáculos
            if(Math.random() < 0.02 && obstacles.length < 5) {
                const obs = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 4), new THREE.MeshStandardMaterial({color: 0x333333}));
                obs.position.set((Math.random()-0.5)*16, 1, car.position.z - 200);
                scene.add(obs);
                obstacles.push(obs);
            }

            // Spawn Moedas
            if(Math.random() < 0.01 && coins.length < 3) {
                const coin = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.2, 16), new THREE.MeshBasicMaterial({color: 0xffdd00}));
                coin.rotation.x = Math.PI/2;
                coin.position.set((Math.random()-0.5)*16, 1, car.position.z - 150);
                scene.add(coin);
                coins.push(coin);
            }

            // Mover Obstáculos e Colisão
            for(let i = obstacles.length-1; i >= 0; i--) {
                obstacles[i].position.z += speedVal * 0.5; // Andam contra
                
                // Colisão simples
                if(Math.abs(car.position.x - obstacles[i].position.x) < 2.5 && 
                   Math.abs(car.position.z - obstacles[i].position.z) < 4) {
                    gameOver();
                }

                if(obstacles[i].position.z > car.position.z + 10) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            // Mover Moedas
            for(let i = coins.length-1; i >= 0; i--) {
                coins[i].position.z += speedVal * 0.5;
                coins[i].rotation.y += 0.1;
                
                // Coleta
                if(Math.abs(car.position.x - coins[i].position.x) < 2 && 
                   Math.abs(car.position.z - coins[i].position.z) < 2) {
                    totalCoins += 10;
                    scene.remove(coins[i]);
                    coins.splice(i, 1);
                    saveProgress();
                } else if(coins[i].position.z > car.position.z + 10) {
                    scene.remove(coins[i]);
                    coins.splice(i, 1);
                }
            }
        }

        // UI E MENUS
        function updateUI() {
            document.getElementById('speed-val').innerText = Math.floor(speed);
            document.getElementById('coin-count').innerText = `MOEDAS: ${totalCoins}`;
            document.getElementById('dist-val').innerText = `${Math.floor(distance)} m`;
        }

        function startGame() {
            gameState = 'PLAYING';
            speed = 0; distance = 0;
            car.position.set(0,0,0);
            obstacles.forEach(o => scene.remove(o)); obstacles = [];
            coins.forEach(c => scene.remove(c)); coins = [];
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = `Distância: ${Math.floor(distance)}m`;
            saveProgress();
        }

        function showGarage() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('garage-screen').style.display = 'flex';
            renderGarage();
        }

        function hideGarage() {
            document.getElementById('garage-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
        }

        function renderGarage() {
            const grid = document.getElementById('garage-grid');
            grid.innerHTML = '';
            
            CAR_COLORS.forEach((color, i) => {
                const card = document.createElement('div');
                card.className = `car-card glass-panel ${selectedCarIndex === i ? 'selected' : ''}`;
                card.innerHTML = `
                    <div style="width:100%; height:50px; background:#${color.toString(16).padStart(6,'0')}; border-radius:10px; margin-bottom:10px;"></div>
                    <span>${i === 0 ? 'Padrão' : (unlockedCars[i] ? 'Equipar' : 'Bloqueado')}</span>
                `;
                card.onclick = () => selectCar(i);
                grid.appendChild(card);
            });
        }

        function selectCar(i) {
            if(i === 0 || unlockedCars[i]) {
                selectedCarIndex = i;
                createPlayerCar();
                saveProgress();
                renderGarage();
                alert("Carro Equipado!");
            } else if(totalCoins >= 100) {
                totalCoins -= 100;
                unlockedCars[i] = true;
                selectedCarIndex = i;
                createPlayerCar();
                saveProgress();
                renderGarage();
                alert("Carro Desbloqueado!");
            } else {
                alert("Faltam moedas! Cada carro custa 100.");
            }
        }

        function saveProgress() {
            localStorage.setItem('neon_coins', totalCoins);
            localStorage.setItem('neon_selected_car', selectedCarIndex);
            localStorage.setItem('neon_unlocked', JSON.stringify(unlockedCars));
        }

        function showMenu() {
            location.reload();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
