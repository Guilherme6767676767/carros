<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER DRIFT - Neon Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #ff1493;
            --cyan: #00ffff;
            --bg: #050508;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI OVERLAY */
        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: flex; flex-direction: column;
            z-index: 10;
        }

        .hud {
            display: flex; justify-content: space-between;
            padding: 20px 40px;
        }

        .hud-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 24px; font-weight: 900;
        }

        #speed-hud { border-bottom: 3px solid var(--neon); color: var(--neon); }
        #coin-hud { border-bottom: 3px solid #ffcc00; color: #ffcc00; }

        /* SCREENS */
        .screen {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; pointer-events: auto;
        }

        h1 { font-size: 80px; margin: 0; font-weight: 900; letter-spacing: -2px; }
        .neon-text { color: var(--neon); text-shadow: 0 0 20px var(--neon); }
        
        .btn {
            margin-top: 30px; padding: 15px 50px;
            font-size: 28px; font-family: inherit; font-weight: 900;
            background: var(--neon); color: white;
            border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--neon);
            text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--neon); }

        .garage-grid {
            display: flex; gap: 20px; margin-top: 40px;
        }
        .car-option {
            width: 150px; padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px; border: 2px solid transparent;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .car-option.selected { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="overlay">
        <div class="hud">
            <div id="speed-hud" class="hud-item">0 KM/H</div>
            <div id="coin-hud" class="hud-item">0 MOEDAS</div>
        </div>
    </div>

    <!-- Interface -->
    <div id="menu-screen" class="screen">
        <h1 class="neon-text">CYBER DRIFT</h1>
        <p style="font-size: 20px; margin-top: 10px;">USE AS SETAS OU WASD</p>
        <button class="btn" onclick="startGame()">CORRER</button>
        <button class="btn" style="background: #333; box-shadow: none;" onclick="showGarage()">GARAGEM</button>
    </div>

    <div id="garage-screen" class="screen" style="display: none;">
        <h1 style="color: var(--cyan); text-shadow: 0 0 20px var(--cyan);">GARAGEM</h1>
        <div id="car-list" class="garage-grid"></div>
        <button class="btn" onclick="hideGarage()">VOLTAR</button>
    </div>

    <div id="game-over-screen" class="screen" style="display: none;">
        <h1 style="color: #ff3333; text-shadow: 0 0 30px #ff3333;">FIM DE LINHA</h1>
        <p id="final-stats" style="font-size: 24px;">Distância: 0m</p>
        <button class="btn" onclick="startGame()">NOVO RACHA</button>
        <button class="btn" style="background: #333; box-shadow: none;" onclick="showMenu()">MENU</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // ESTADO DO JOGO
        let gameState = 'MENU';
        let score = 0;
        let totalCoins = parseInt(localStorage.getItem('drift_coins')) || 0;
        let selectedCar = parseInt(localStorage.getItem('drift_selected_car')) || 0;
        let unlockedCars = JSON.parse(localStorage.getItem('drift_unlocked')) || [true, false, false];

        // CONFIG CARROS
        const CARS = [
            { name: "Neon Pink", color: "#ff1493", speed: 10, price: 0 },
            { name: "Cyber Blue", color: "#00ffff", speed: 13, price: 50 },
            { name: "Volt Gold", color: "#ffee00", speed: 16, price: 150 }
        ];

        // OBJETOS DO MUNDO
        let player = { x: 0, y: 0, w: 40, h: 80, angle: 0, drift: 0 };
        let roadOffset = 0;
        let obstacles = [];
        let particles = [];
        let coins = [];
        let keys = {};

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.y = height - 150;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            obstacles = [];
            coins = [];
            particles = [];
            roadOffset = 0;
            player.x = width / 2;
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            requestAnimationFrame(gameLoop);
        }

        function showGarage() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('garage-screen').style.display = 'flex';
            renderGarage();
        }

        function hideGarage() {
            document.getElementById('garage-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
        }

        function renderGarage() {
            const list = document.getElementById('car-list');
            list.innerHTML = '';
            CARS.forEach((car, i) => {
                const div = document.createElement('div');
                div.className = `car-option ${selectedCar === i ? 'selected' : ''}`;
                div.innerHTML = `
                    <div style="background: ${car.color}; height: 40px; border-radius: 5px; margin-bottom: 10px; box-shadow: 0 0 10px ${car.color}"></div>
                    <div style="font-weight:900">${car.name}</div>
                    <div style="font-size:12px; opacity:0.7">${unlockedCars[i] ? 'EQUIPADO' : car.price + ' MOEDAS'}</div>
                `;
                div.onclick = () => selectCar(i);
                list.appendChild(div);
            });
        }

        function selectCar(i) {
            if(unlockedCars[i]) {
                selectedCar = i;
                localStorage.setItem('drift_selected_car', i);
                renderGarage();
            } else if(totalCoins >= CARS[i].price) {
                totalCoins -= CARS[i].price;
                unlockedCars[i] = true;
                selectedCar = i;
                localStorage.setItem('drift_coins', totalCoins);
                localStorage.setItem('drift_unlocked', JSON.stringify(unlockedCars));
                localStorage.setItem('drift_selected_car', i);
                renderGarage();
                updateHUD();
            }
        }

        function showMenu() {
            location.reload();
        }

        function gameLoop() {
            if(gameState !== 'PLAYING') return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            const speed = CARS[selectedCar].speed;
            roadOffset += speed;
            score += speed * 0.01;

            // Movimento do Jogador
            let dx = 0;
            if(keys['ArrowLeft'] || keys['KeyA']) dx = -8;
            if(keys['ArrowRight'] || keys['KeyD']) dx = 8;
            
            player.x += dx;
            player.angle = dx * 0.05; // Inclinação
            player.x = Math.max(width * 0.2, Math.min(player.x, width * 0.8));

            // Partículas de fumaça rastro
            if(Math.random() < 0.3) {
                particles.push({ 
                    x: player.x + (Math.random()-0.5)*20, 
                    y: player.y + 40, 
                    size: 5 + Math.random()*10,
                    alpha: 0.5,
                    vx: -dx * 0.2
                });
            }

            // Atuallizar partículas
            particles.forEach((p, i) => {
                p.y += speed * 0.5;
                p.x += p.vx || 0;
                p.alpha -= 0.02;
                if(p.alpha <= 0) particles.splice(i, 1);
            });

            // Obstáculos
            if(Math.random() < 0.02 && obstacles.length < 5) {
                obstacles.push({ x: width*0.2 + Math.random()*(width*0.6), y: -100, w: 50, h: 90, color: '#333' });
            }

            obstacles.forEach((o, i) => {
                o.y += speed * 0.7;
                // Colisão
                if(Math.abs(player.x - o.x) < 40 && Math.abs(player.y - o.y) < 80) {
                    gameOver();
                }
                if(o.y > height) obstacles.splice(i, 1);
            });

            // Moedas
            if(Math.random() < 0.01 && coins.length < 3) {
                coins.push({ x: width*0.2 + Math.random()*(width*0.6), y: -50, r: 15 });
            }

            coins.forEach((c, i) => {
                c.y += speed;
                if(Math.abs(player.x - c.x) < 35 && Math.abs(player.y - c.y) < 50) {
                    totalCoins += 10;
                    coins.splice(i, 1);
                    updateHUD();
                    localStorage.setItem('drift_coins', totalCoins);
                }
                if(c.y > height) coins.splice(i, 1);
            });

            updateHUD();
        }

        function updateHUD() {
            document.getElementById('speed-hud').innerText = `${Math.floor(CARS[selectedCar].speed * 12)} KM/H`;
            document.getElementById('coin-hud').innerText = `${totalCoins} MOEDAS`;
        }

        function draw() {
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, width, height);

            // Estrada Parallax
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(width * 0.2, 0, width * 0.6, height);

            // Linhas Neon
            ctx.strokeStyle = '#222';
            ctx.setLineDash([40, 40]);
            ctx.lineDashOffset = -roadOffset;
            ctx.beginPath();
            ctx.moveTo(width * 0.5, 0); ctx.lineTo(width * 0.5, height);
            ctx.stroke();

            // Bordas Neon
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(width * 0.2 - 5, 0, 5, height);
            ctx.fillRect(width * 0.8, 0, 5, height);

            // Desenhar Partículas
            ctx.shadowBlur = 0;
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });

            // Desenhar Moedas
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffcc00';
            coins.forEach(c => {
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
                ctx.fill();
            });

            // Desenhar Obstáculos (Carros tráfego)
            ctx.shadowBlur = 0;
            obstacles.forEach(o => {
                ctx.fillStyle = o.color;
                ctx.fillRect(o.x - 25, o.y - 45, 50, 90);
                ctx.fillStyle = '#ff0000'; // Lanternas
                ctx.fillRect(o.x - 20, o.y + 35, 10, 5);
                ctx.fillRect(o.x + 10, o.y + 35, 10, 5);
            });

            // Jogador
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.shadowBlur = 20;
            ctx.shadowColor = CARS[selectedCar].color;
            ctx.fillStyle = CARS[selectedCar].color;
            ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
            
            // Vidro / Detalhes
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(-15, -20, 30, 15);
            ctx.restore();
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-stats').innerText = `Distância: ${Math.floor(score * 10)}m`;
        }

        updateHUD();
    </script>
</body>
</html>
