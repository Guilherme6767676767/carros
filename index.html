<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Racer 3D - Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js Global Script - Important for compatibility -->
    <script src="https://unpkg.com/three@0.162.0/build/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    
    <!-- UI Overlay for Dashboard & Mirror -->
    <div id="overlay">
        <!-- Rearview Mirror -->
        <div id="rearview-mirror">
            <div class="mirror-reflection"></div>
        </div>

        <!-- Dashboard Structure -->
        <div id="dashboard">
            <div id="center-console">
                <div class="screen">GPS ACTIVE</div>
            </div>
        </div>

        <!-- Steering & Speedometer -->
        <div id="driver-pov">
            <div id="left-hand" class="hand"></div>
            <div id="right-hand" class="hand"></div>
            <div id="steering-wheel">
                <div class="wheel-center">
                    <div id="speedometer">0<br><span style="font-size:12px;color:#aaa">km/h</span></div>
                </div>
            </div>
        </div>

        <div id="score">Moedas: 0 | Dist: 0m</div>
    </div>
    
    <div id="loading">CARREGANDO MUNDO NEON...</div>

    <!-- Garage UI -->
    <div id="garage" style="display: none;">
        <h1>GARAGEM PREMIUM</h1>
        <p>SUAS MOEDAS: <span id="garage-coins" style="color:#ffdd00">0</span></p>
        <div id="car-options">
            <div class="car-item" onclick="window.buyCar(0, 0)">
                <div style="background:#ffffff; height:20px; border-radius:5px; margin-bottom:5px;"></div>
                Fusca Branco (Grátis)
            </div>
            <div class="car-item" onclick="window.buyCar(1, 50)">
                <div style="background:#ff0000; height:20px; border-radius:5px; margin-bottom:5px;"></div>
                Esportivo Vermelho (50)
            </div>
            <div class="car-item" onclick="window.buyCar(2, 150)">
                <div style="background:#111111; height:20px; border-radius:5px; margin-bottom:5px;"></div>
                Luxo Preto (150)
            </div>
            <div class="car-item" onclick="window.buyCar(3, 300)">
                <div style="background:#ffdd00; height:20px; border-radius:5px; margin-bottom:5px;"></div>
                Dourado Raro (300)
            </div>
        </div>
        <button class="ui-btn" onclick="window.closeGarage()">VOLTAR</button>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display: none;">
        <h1 style="color:#ff3333">BATIDA!</h1>
        <p id="coin-result">Você coletou 0 moedas!</p>
        <div style="display:flex; gap:20px;">
            <button class="ui-btn" onclick="location.reload()">REPETIR</button>
            <button class="ui-btn" style="background:#444" onclick="window.openGarage()">GARAGEM</button>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
