<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing Limits - Day City</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/examples/jsm/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container"></div>
    
    <!-- UI Overlay for Dashboard & Mirror -->
    <div id="overlay">
        <!-- Rearview Mirror (Center Top) -->
        <div id="rearview-mirror">
            <div class="mirror-reflection"></div>
        </div>

        <!-- Windshield Frame (A-Pillars) -->
        <div id="left-pillar" class="pillar"></div>
        <div id="right-pillar" class="pillar"></div>

        <!-- Dashboard Bottom -->
        <div id="dashboard">
            <!-- Left Vent -->
            <div class="air-vent left"></div>
            <!-- Center Console -->
            <div id="center-console">
                <div class="air-vent"></div>
                <div class="air-vent"></div>
                <div class="screen">GPS</div>
            </div>
            <!-- Right Vent -->
            <div class="air-vent right"></div>
        </div>

        <!-- Driver POV (Steering Wheel + Hands + Speedometer) -->
        <div id="driver-pov">
            <!-- Illusion of Driver Hands holding the wheel -->
            <div id="left-hand" class="hand"></div>
            <div id="right-hand" class="hand"></div>
            
            <div id="steering-wheel">
                <div class="wheel-center">
                    <div id="speedometer">0<br><span style="font-size:12px;color:#aaa">km/h</span></div>
                </div>
            </div>
        </div>

        <!-- Score top right -->
        <div id="score">Pontos: 0</div>
    </div>
    
    <div id="loading">Carregando Cidade de Luxo...</div>

    <!-- Garage / Shop UI -->
    <div id="garage" style="display: none;">
        <h1>Garagem</h1>
        <p>Moedas: <span id="garage-coins" style="color:#ffdd00">0</span></p>
        <div id="car-options">
            <div class="car-item" onclick="window.buyCar(0, 0)">Fusca Branco (Grátis)</div>
            <div class="car-item" onclick="window.buyCar(1, 50)">Esportivo Vermelho (50 Moedas)</div>
            <div class="car-item" onclick="window.buyCar(2, 150)">Luxo Preto (150 Moedas)</div>
            <div class="car-item" onclick="window.buyCar(3, 300)">Dourado Raro (300 Moedas)</div>
        </div>
        <button onclick="window.closeGarage()">Voltar</button>
    </div>

    <div id="game-over" style="display: none;">
        <h1>BATIDA!</h1>
        <p id="coin-result">Você coletou 0 moedas!</p>
        <div style="display:flex; gap:10px;">
            <button onclick="location.reload()">Correr De Novo</button>
            <button onclick="window.openGarage()">Garagem</button>
        </div>
    </div>
    
    <!-- Game Source -->
    <script type="module" src="main.js"></script>
</body>
</html>
